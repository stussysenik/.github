name: CI — Swift

on:
  workflow_call:
    inputs:
      swift-version:
        description: "Swift version"
        type: string
        default: "6.0"
      scheme:
        description: "Xcode scheme to build"
        type: string
        default: ""
      platform:
        description: "Target platform (iOS, macOS)"
        type: string
        default: "macOS"
      run-tests:
        description: "Run tests"
        type: boolean
        default: true

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (SPM)
        if: inputs.scheme == ''
        run: swift build

      - name: Test (SPM)
        if: inputs.scheme == '' && inputs.run-tests
        run: swift test

      - name: Build (Xcode)
        if: inputs.scheme != ''
        run: |
          DESTINATION="platform=${{ inputs.platform }} Simulator,name=iPhone 16"
          if [ "${{ inputs.platform }}" = "macOS" ]; then
            DESTINATION="platform=macOS"
          fi
          xcodebuild build \
            -scheme "${{ inputs.scheme }}" \
            -destination "$DESTINATION" \
            -skipPackagePluginValidation

      - name: Test (Xcode)
        if: inputs.scheme != '' && inputs.run-tests
        run: |
          DESTINATION="platform=${{ inputs.platform }} Simulator,name=iPhone 16"
          if [ "${{ inputs.platform }}" = "macOS" ]; then
            DESTINATION="platform=macOS"
          fi
          xcodebuild test \
            -scheme "${{ inputs.scheme }}" \
            -destination "$DESTINATION" \
            -skipPackagePluginValidation
