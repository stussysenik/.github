name: Stale Issues

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: "Days before marking as stale"
        type: number
        default: 60
      days-before-close:
        description: "Days before closing stale issues"
        type: number
        default: 14

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: "This issue has been inactive for ${{ inputs.days-before-stale }} days. It will be closed in ${{ inputs.days-before-close }} days if there's no further activity."
          stale-pr-message: "This PR has been inactive for ${{ inputs.days-before-stale }} days. It will be closed in ${{ inputs.days-before-close }} days if there's no further activity."
          exempt-issue-labels: "pinned,keep"
          exempt-pr-labels: "pinned,keep"
