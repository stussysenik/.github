name: CI — Python

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.12"
      working-directory:
        description: "Working directory"
        type: string
        default: "."
      run-lint:
        description: "Run linting (ruff)"
        type: boolean
        default: true
      run-typecheck:
        description: "Run type checking (mypy)"
        type: boolean
        default: false
      run-tests:
        description: "Run tests (pytest)"
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e .; fi

      - name: Lint (ruff)
        if: inputs.run-lint
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        if: inputs.run-typecheck
        run: |
          pip install mypy
          mypy .

      - name: Test (pytest)
        if: inputs.run-tests
        run: |
          pip install pytest
          pytest
