name: CI — Node.js

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      package-manager:
        description: "Package manager (npm, pnpm, bun)"
        type: string
        default: "npm"
      working-directory:
        description: "Working directory"
        type: string
        default: "."
      run-lint:
        description: "Run linting step"
        type: boolean
        default: true
      run-typecheck:
        description: "Run type checking step"
        type: boolean
        default: true
      run-tests:
        description: "Run test step"
        type: boolean
        default: true
      run-build:
        description: "Run build step"
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Lint
        if: inputs.run-lint
        run: |
          if [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun run lint
          else
            ${{ inputs.package-manager }} run lint
          fi

      - name: Type check
        if: inputs.run-typecheck
        run: |
          if [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun run typecheck
          else
            ${{ inputs.package-manager }} run typecheck
          fi

      - name: Test
        if: inputs.run-tests
        run: |
          if [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun test
          else
            ${{ inputs.package-manager }} test
          fi

      - name: Build
        if: inputs.run-build
        run: |
          if [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun run build
          else
            ${{ inputs.package-manager }} run build
          fi
